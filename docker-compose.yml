services:
  postgres:
    image: postgres:16-alpine
    container_name: nobelion_postgres
    environment:
      POSTGRES_DB: nobelion
      POSTGRES_USER: nobelion
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobelion -d nobelion"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - nobelion_net
    restart: unless-stopped

  nobelion_backend:
    build:
      context: .
    container_name: nobelion_backend
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://nobelion:${DB_PASSWORD}@postgres:5432/nobelion
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    networks:
      - nobelion_net
      - debian_default
    restart: unless-stopped

volumes:
  postgres_data: null

networks:
  nobelion_net: null
  debian_default:
    external: true